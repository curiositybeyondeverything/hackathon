<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Judging Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap">

<!-- Supabase JS SDK (UMD bundle, loads as the global `supabase`) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ==========================================================================
   Judging Console
   Single-file app. Backed by Supabase (Postgres + Realtime).
   See SUPABASE_SETUP.md for setup. Schema is in schema.sql.
   ========================================================================== */

:root {
  --eh-bg: #07080a;
  --eh-surface: #0e0f13;
  --eh-surface-2: #14161c;
  --eh-border: #1f2129;
  --eh-border-bright: #2a2d38;
  --eh-text: #e7e7ea;
  --eh-text-dim: #8a8d97;
  --eh-text-mute: #5b5e68;
  --eh-lime: #c5fb45;
  --eh-cyan: #5cf2ee;
  --eh-magenta: #ff3d71;
}
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--eh-bg); color: var(--eh-text);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased; min-height: 100vh;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
.eh-display { font-family: 'Bebas Neue', system-ui, sans-serif; letter-spacing: 0.04em; line-height: 0.95; }
.eh-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

.eh-grid-bg {
  background-image:
    linear-gradient(rgba(197,251,69,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(197,251,69,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* Layout */
.shell { min-height: 100vh; display: flex; flex-direction: column; }
.container { max-width: 1400px; width: 100%; margin: 0 auto; padding: 0 20px; }
.container-md { max-width: 1100px; width: 100%; margin: 0 auto; padding: 0 20px; }
.container-sm { max-width: 760px; width: 100%; margin: 0 auto; padding: 0 20px; }

/* Top bar */
.topbar { position: sticky; top: 0; z-index: 30; border-bottom: 1px solid var(--eh-border); background: rgba(7,8,10,0.92); backdrop-filter: blur(8px); }
.topbar-inner { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; max-width: 1400px; margin: 0 auto; gap: 16px; }
.topbar-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

/* Brand */
.brand { display: inline-flex; align-items: center; gap: 12px; cursor: pointer; background: none; border: 0; padding: 0; color: inherit; }
.brand:hover { opacity: 0.85; }
.brand-mark { position: relative; width: 36px; height: 36px; border: 1px solid var(--eh-lime); display: flex; align-items: center; justify-content: center; background: #000; }
.brand-mark::after { content: ''; position: absolute; top: -3px; right: -3px; width: 8px; height: 8px; background: var(--eh-magenta); }
.brand-dot { width: 12px; height: 12px; background: var(--eh-lime); animation: eh-pulse 1.6s ease-in-out infinite; }
.brand-text { display: flex; flex-direction: column; line-height: 1; text-align: left; }
.brand-title { font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: 0.04em; }
.brand-title .accent { color: var(--eh-lime); }
.brand-sub { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--eh-text-mute); letter-spacing: 0.3em; text-transform: uppercase; margin-top: 4px; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; min-height: 38px; font-family: 'JetBrains Mono'; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.18em; border: 1px solid var(--eh-border-bright); background: var(--eh-surface); color: var(--eh-text); transition: border-color 0.15s, color 0.15s, background 0.15s; white-space: nowrap; }
.btn:hover:not(:disabled) { border-color: var(--eh-lime); color: var(--eh-lime); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { border-color: var(--eh-lime); background: var(--eh-lime); color: #000; }
.btn-primary:hover:not(:disabled) { background: #d2ff5c; border-color: #d2ff5c; color: #000; }
.btn-ghost { border-color: transparent; background: transparent; color: var(--eh-text-dim); }
.btn-ghost:hover:not(:disabled) { color: var(--eh-text); border-color: var(--eh-border-bright); background: transparent; }
.btn-danger { border-color: #7f1d1d; background: rgba(127,29,29,0.25); color: #fecaca; }
.btn-danger:hover:not(:disabled) { border-color: #f87171; color: #fee2e2; }
.btn-warning { border-color: #b45309; background: rgba(180,83,9,0.2); color: #fcd34d; }
.btn-warning:hover:not(:disabled) { border-color: #fbbf24; color: #fde68a; }
.btn .icon { width: 14px; height: 14px; flex-shrink: 0; }
.btn-block { width: 100%; }
.btn-lg { padding: 14px 22px; min-height: 48px; font-size: 12px; }
.btn-lg .icon { width: 16px; height: 16px; }

/* Tags */
.tag { display: inline-flex; align-items: center; padding: 2px 8px; border: 1px solid var(--eh-border-bright); font-family: 'JetBrains Mono'; font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--eh-text-dim); }
.tag.tag-lime { border-color: var(--eh-lime); color: var(--eh-lime); background: rgba(197,251,69,0.08); }
.tag.tag-cyan { border-color: #06b6d4; color: #67e8f9; background: rgba(6,182,212,0.12); }
.tag.tag-amber { border-color: #f59e0b; color: #fcd34d; background: rgba(245,158,11,0.12); }
.tag.tag-mute { border-color: var(--eh-border); color: var(--eh-text-mute); }
.tag .icon { width: 10px; height: 10px; margin-right: 4px; }

/* Panels & cards */
.panel { border: 1px solid var(--eh-border); background: var(--eh-surface); }
.panel-header { border-bottom: 1px solid var(--eh-border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 10px; text-transform: uppercase; letter-spacing: 0.28em; color: var(--eh-text-dim); }
.panel-body { padding: 20px; }

/* Stats */
.stat { border: 1px solid var(--eh-border); background: var(--eh-surface); padding: 16px; }
.stat-label { font-family: 'JetBrains Mono'; font-size: 10px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--eh-text-mute); margin-bottom: 6px; }
.stat-value { font-family: 'Bebas Neue'; font-size: 32px; line-height: 1; color: var(--eh-lime); }
.stat-value.cyan { color: #67e8f9; }
.stat-sub { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--eh-text-dim); margin-top: 8px; }

/* Forms */
.field { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-family: 'JetBrains Mono'; font-size: 10px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--eh-text-dim); }
.field-label .req { color: var(--eh-magenta); margin-left: 4px; }
.field-hint { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--eh-text-mute); }
.input, .textarea { width: 100%; background: var(--eh-surface-2); border: 1px solid var(--eh-border); padding: 10px 12px; font-family: 'JetBrains Mono'; font-size: 13px; color: var(--eh-text); outline: none; transition: border-color 0.15s; }
.input::placeholder, .textarea::placeholder { color: var(--eh-text-mute); }
.input:focus, .textarea:focus { border-color: var(--eh-lime); }
.textarea { resize: vertical; min-height: 90px; }

/* Range sliders */
input[type=range].eh-range { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; background: transparent; outline: none; margin: 4px 0; }
input[type=range].eh-range:disabled { opacity: 0.5; }
input[type=range].eh-range::-webkit-slider-runnable-track { height: 6px; border: 1px solid #2a2d38; background: linear-gradient(90deg, var(--eh-lime) 0%, var(--eh-lime) var(--pct,0%), #1f2129 var(--pct,0%)); }
input[type=range].eh-range::-moz-range-track { height: 6px; background: #1f2129; border: 1px solid #2a2d38; }
input[type=range].eh-range::-moz-range-progress { height: 6px; background: var(--eh-lime); }
input[type=range].eh-range::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; background: var(--eh-bg); border: 2px solid var(--eh-lime); margin-top: -7px; box-shadow: 0 0 12px rgba(197,251,69,0.6); cursor: pointer; }
input[type=range].eh-range::-moz-range-thumb { width: 18px; height: 18px; background: var(--eh-bg); border: 2px solid var(--eh-lime); box-shadow: 0 0 12px rgba(197,251,69,0.6); cursor: pointer; border-radius: 0; }

/* Bonus checkbox tile */
.bonus-tile { position: relative; display: flex; align-items: center; gap: 12px; border: 1px solid var(--eh-border); background: var(--eh-surface-2); padding: 12px 16px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.bonus-tile.is-checked { border-color: var(--eh-lime); background: rgba(197,251,69,0.08); }
.bonus-tile.is-disabled { opacity: 0.5; cursor: not-allowed; }
.bonus-tile input { position: absolute; opacity: 0; pointer-events: none; }
.bonus-tile .checkmark { position: relative; width: 20px; height: 20px; border: 1px solid var(--eh-border-bright); background: var(--eh-bg); flex-shrink: 0; }
.bonus-tile.is-checked .checkmark { background: var(--eh-lime); border-color: var(--eh-lime); }
.bonus-tile.is-checked .checkmark::after { content: ''; position: absolute; left: 6px; top: 2px; width: 4px; height: 10px; border: solid #000; border-width: 0 2px 2px 0; transform: rotate(45deg); }
.bonus-tile .icon { width: 16px; height: 16px; color: var(--eh-text-mute); }
.bonus-tile.is-checked .icon { color: var(--eh-lime); }
.bonus-tile .bonus-label { flex: 1; font-size: 14px; }
.bonus-tile .bonus-value { font-family: 'JetBrains Mono'; font-size: 14px; color: var(--eh-text-mute); }
.bonus-tile.is-checked .bonus-value { color: var(--eh-lime); }

/* Toasts */
#toasts { position: fixed; bottom: 24px; right: 24px; z-index: 100; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { pointer-events: auto; padding: 12px 16px; border-left: 2px solid; backdrop-filter: blur(10px); font-family: 'JetBrains Mono'; font-size: 13px; letter-spacing: 0.02em; animation: toast-in 0.18s ease-out; max-width: 360px; }
.toast.success { border-color: var(--eh-lime); background: rgba(132,204,22,0.15); color: #ecfccb; }
.toast.error { border-color: var(--eh-magenta); background: rgba(159,18,57,0.4); color: #fee2e2; }
.toast.info { border-color: #06b6d4; background: rgba(8,145,178,0.25); color: #cffafe; }
@keyframes toast-in { from { transform: translateX(8px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 16px; overflow-y: auto; }
.modal { background: var(--eh-surface); border: 1px solid var(--eh-border-bright); width: 100%; max-width: 640px; margin: auto; }
.modal-sm { max-width: 460px; }
.modal-header { border-bottom: 1px solid var(--eh-border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.modal-title { font-family: 'Bebas Neue'; font-size: 24px; line-height: 1; }
.modal-eyebrow { font-family: 'JetBrains Mono'; font-size: 10px; text-transform: uppercase; letter-spacing: 0.28em; color: var(--eh-text-dim); margin-bottom: 4px; }
.modal-body { padding: 20px; }
.modal-footer { border-top: 1px solid var(--eh-border); padding: 12px 20px; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-grid .span-2 { grid-column: span 2; }
@media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-grid .span-2 { grid-column: span 1; } }

/* Tables */
.table-wrap { overflow-x: auto; }
table.eh-table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono'; font-size: 12px; }
.eh-table thead { background: var(--eh-surface-2); border-bottom: 1px solid var(--eh-border); }
.eh-table th, .eh-table td { padding: 12px 14px; text-align: left; }
.eh-table th { font-size: 10px; color: var(--eh-text-mute); text-transform: uppercase; letter-spacing: 0.22em; font-weight: 500; }
.eh-table tbody tr { border-bottom: 1px solid var(--eh-border); }
.eh-table tbody tr:hover { background: var(--eh-surface-2); }
.eh-table .text-right { text-align: right; }
.eh-table .text-center { text-align: center; }
.eh-table .border-l { border-left: 1px solid var(--eh-border); }
.eh-table thead .sticky-col { position: sticky; left: 0; background: var(--eh-surface-2); z-index: 1; }
.eh-table tbody .sticky-col { position: sticky; left: 0; background: var(--eh-surface); z-index: 1; }
.eh-table tbody tr:hover .sticky-col { background: var(--eh-surface-2); }

/* Animations */
@keyframes eh-pulse { 0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(197,251,69,0.6); } 50% { opacity: 0.85; box-shadow: 0 0 0 6px rgba(197,251,69,0); } }
.eh-pulse-dot { animation: eh-pulse 1.6s ease-in-out infinite; }
.spinner { width: 32px; height: 32px; border: 2px solid var(--eh-lime); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Hero */
.hero { position: relative; overflow: hidden; padding: 48px 0 64px; }
.hero-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 720px; height: 720px; border-radius: 50%; background: rgba(197,251,69,0.07); filter: blur(140px); pointer-events: none; }
.hero-content { position: relative; display: grid; grid-template-columns: 1fr; gap: 36px; }
@media (min-width: 960px) { .hero-content { grid-template-columns: 7fr 5fr; } }
.hero-eyebrow { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.hero-eyebrow .dot { width: 8px; height: 8px; background: var(--eh-lime); }
.hero-eyebrow .text { font-family: 'JetBrains Mono'; font-size: 11px; text-transform: uppercase; letter-spacing: 0.32em; color: var(--eh-lime); }
.hero h1 { font-family: 'Bebas Neue'; letter-spacing: 0.04em; font-size: clamp(56px, 9vw, 110px); line-height: 0.88; margin: 0 0 16px; }
.hero h1 .lime { color: var(--eh-lime); }
.hero h1 .dim { color: var(--eh-text-dim); }
.hero p.lead { color: var(--eh-text-dim); max-width: 560px; font-size: 16px; line-height: 1.55; margin: 0 0 24px; }
.hero-actions { display: flex; flex-wrap: wrap; gap: 10px; }

.judge-list-card { border: 1px solid var(--eh-border); background: rgba(14,15,19,0.85); backdrop-filter: blur(8px); }
.judge-list-row { width: 100%; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; background: none; border: 0; border-top: 1px solid var(--eh-border); text-align: left; color: inherit; transition: background 0.15s; }
.judge-list-row:first-of-type { border-top: 0; }
.judge-list-row:hover { background: var(--eh-surface-2); }
.judge-list-row:hover .judge-name { color: var(--eh-lime); }
.judge-list-row .judge-name { font-family: 'Bebas Neue'; font-size: 22px; line-height: 1; transition: color 0.15s; }
.judge-list-row .judge-meta { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--eh-text-mute); margin-top: 4px; }
.judge-list-row .judge-url { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--eh-text-dim); }
@media (max-width: 600px) { .judge-list-row .judge-url { display: none; } }

.stat-grid { margin-top: 56px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
@media (min-width: 960px) { .stat-grid { grid-template-columns: repeat(4, 1fr); } }

/* Judge page */
.judge-id-card .judge-id-inner { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
@media (min-width: 720px) { .judge-id-card .judge-id-inner { flex-direction: row; align-items: center; justify-content: space-between; } }
.judge-avatar { width: 56px; height: 56px; border: 1px solid var(--eh-lime); background: #000; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 32px; color: var(--eh-lime); }
.judge-id-name { display: flex; align-items: center; gap: 16px; }
.judge-progress { display: flex; align-items: center; gap: 16px; }
.judge-progress-bar { width: 128px; height: 8px; background: var(--eh-surface-2); border: 1px solid var(--eh-border); }
.judge-progress-bar-fill { height: 100%; background: var(--eh-lime); transition: width 0.3s; }

.team-row { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid var(--eh-border); transition: background 0.15s; }
@media (min-width: 720px) { .team-row { flex-direction: row; align-items: center; } }
.team-row:hover { background: var(--eh-surface-2); }
.team-row-main { flex: 1; min-width: 0; }
.team-row-name { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 4px; }
.team-row-name .team-name { font-family: 'Bebas Neue'; font-size: 22px; line-height: 1; }
.team-row-project { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--eh-text-dim); }
.team-row-actions { display: flex; align-items: center; gap: 12px; }
.team-row-score { display: flex; align-items: center; gap: 8px; }
.team-row-score .score { font-family: 'Bebas Neue'; font-size: 24px; color: var(--eh-lime); line-height: 1; }
.team-row-score .out-of { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--eh-text-mute); }

.lock-banner { border-top: 1px solid rgba(180,83,9,0.4); background: rgba(180,83,9,0.18); padding: 10px 20px; display: flex; align-items: center; gap: 10px; font-family: 'JetBrains Mono'; font-size: 12px; color: #fcd34d; }

/* Scoring form */
.score-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
@media (min-width: 1024px) { .score-grid { grid-template-columns: 2fr 1fr; } }
.criterion + .criterion { padding-top: 24px; border-top: 1px dashed var(--eh-border); }
.criterion-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
.criterion-label { font-size: 14px; font-weight: 500; color: var(--eh-text); }
.criterion-hint { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--eh-text-mute); margin-top: 2px; }
.criterion-value { font-family: 'Bebas Neue'; font-size: 26px; color: var(--eh-lime); line-height: 1; flex-shrink: 0; }
.criterion-value .max { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--eh-text-mute); margin-left: 2px; }
.criterion-bounds { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 10px; color: var(--eh-text-mute); margin-top: 4px; }

.bonus-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
@media (min-width: 600px) { .bonus-grid { grid-template-columns: 1fr 1fr; } }

/* Calc panel */
.calc-panel-desktop { display: none; }
@media (min-width: 1024px) { .calc-panel-desktop { display: block; position: sticky; top: 88px; } }
.calc-panel-mobile { position: fixed; bottom: 0; left: 0; right: 0; z-index: 20; border-top: 1px solid var(--eh-lime); background: rgba(14,15,19,0.96); backdrop-filter: blur(8px); padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
@media (min-width: 1024px) { .calc-panel-mobile { display: none; } }
.calc-panel { border: 1px solid var(--eh-lime); background: var(--eh-surface); position: relative; }
.calc-panel::before { content: ''; position: absolute; inset: 0; pointer-events: none; background-image: linear-gradient(rgba(197,251,69,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(197,251,69,0.04) 1px, transparent 1px); background-size: 32px 32px; }
.calc-panel-inner { padding: 20px; position: relative; }
.calc-row { display: flex; align-items: baseline; justify-content: space-between; padding-bottom: 10px; border-bottom: 1px solid var(--eh-border); margin-bottom: 10px; }
.calc-row:last-of-type { border-bottom: 0; margin-bottom: 0; }
.calc-row .calc-label { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--eh-text-dim); }
.calc-row .calc-num { font-family: 'Bebas Neue'; font-size: 26px; }
.calc-row .calc-num .max { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--eh-text-mute); }
.calc-row .calc-num.bonus { color: #67e8f9; }
.calc-row.final .calc-label { color: var(--eh-lime); text-transform: uppercase; letter-spacing: 0.18em; }
.calc-row.final .calc-num { font-size: 56px; color: var(--eh-lime); line-height: 1; }
.calc-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }

.calc-mobile-final { flex: 1; }
.calc-mobile-final .calc-label { font-family: 'JetBrains Mono'; font-size: 10px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--eh-text-dim); }
.calc-mobile-final .num { display: flex; align-items: baseline; gap: 4px; }
.calc-mobile-final .num .big { font-family: 'Bebas Neue'; font-size: 32px; color: var(--eh-lime); line-height: 1; }
.calc-mobile-final .num .small { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--eh-text-mute); }
.calc-mobile-final .breakdown { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--eh-text-mute); margin-top: 2px; }

/* Admin */
.admin-header { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
.admin-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

<script>

   ╚════════════════════════════════════════════════════════════════════════╝ */

const SUPABASE_URL      = 'https://anzlxkchjatafuafxhrx.supabase.co'; // ← e.g. 'https://abcdefghijk.supabase.co'
const SUPABASE_ANON_KEY = 'sb_publishable_UKT3HKPbdl4rHOgQ5w0W6A_IGgD_xhn'; // ← the long "anon public" key starting with 'eyJ...'

/* ══════════════════════════════════════════════════════════════════════════
   Constants — rubric and bonuses
   ══════════════════════════════════════════════════════════════════════════ */

const AUTH_STORAGE_KEY = 'edgehack2026.auth.v1';

const RUBRIC = [
  { key: 'technical',     label: 'Technical Architecture & Depth', max: 25, hint: 'System design, code quality, technical complexity' },
  { key: 'innovation',    label: 'Innovation & Creativity',        max: 20, hint: 'Originality of approach and ideas' },
  { key: 'functionality', label: 'Functionality & Working Demo',   max: 20, hint: 'Does it actually work end-to-end' },
  { key: 'business',      label: 'Business Impact & Relevance',    max: 15, hint: 'Real-world value and market fit' },
  { key: 'presentation',  label: 'Presentation & Communication',   max: 12, hint: 'Clarity of pitch and demo' },
  { key: 'feasibility',   label: 'Feasibility & Future Roadmap',   max: 8,  hint: 'Path to production / next steps' },
];
const BASE_MAX = 100;

const BONUSES = [
  { key: 'realWorldData', label: 'Real-World Data',         value: 5, iconKey: 'database' },
  { key: 'security',      label: 'Security & Privacy',      value: 5, iconKey: 'shield' },
  { key: 'crossTrack',    label: 'Cross-Track Integration', value: 3, iconKey: 'layers' },
  { key: 'accessibility', label: 'Accessibility & Inclusion', value: 2, iconKey: 'eye' },
];
const BONUS_MAX = 15;

/* ══════════════════════════════════════════════════════════════════════════
   Supabase client + data layer
   ══════════════════════════════════════════════════════════════════════════ */

const isConfigured = () => !!(SUPABASE_URL && SUPABASE_ANON_KEY) && !SUPABASE_URL.includes('YOUR_');

let sb = null; // Supabase client (initialised on boot)
let adminSessionPassword = ''; // Kept in memory only, never persisted.

// DB ↔ JS field mapping (DB uses snake_case, app uses camelCase)
const teamFromDB = (r) => ({
  id: r.id, name: r.name,
  projectTitle: r.project_title,
  track: r.track || '',
  tableNumber: r.table_number || '',
  members: r.members || '',
  notes: r.notes || '',
});
const teamToDB = (t) => ({
  name: t.name,
  project_title: t.projectTitle,
  track: t.track || null,
  table_number: t.tableNumber || null,
  members: t.members || null,
  notes: t.notes || null,
});
const scoreFromDB = (r) => ({
  id: r.id, teamId: r.team_id, judgeSlug: r.judge_slug,
  scores: r.scores || {}, bonuses: r.bonuses || {},
  feedback: r.feedback || '',
  createdAt: r.created_at, updatedAt: r.updated_at,
});
const judgeFromDB = (r) => ({
  slug: r.slug,
  name: r.name,
  org: r.org || '',
  expertise: r.expertise || '',
});

const getJudges = () => state.data.judges || [];
const judgeBySlug = (slug) => getJudges().find(j => j.slug === slug);

function appBaseUrl() {
  const url = new URL(window.location.href);
  url.hash = '';
  return url.href;
}

function judgePortalUrl(slug) {
  return `${appBaseUrl()}#/judge/${encodeURIComponent(slug)}`;
}

function slugify(value) {
  return String(value || '')
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function nextJudgeSlug(seed) {
  const base = slugify(seed);
  if (!base) return '';
  const used = new Set(getJudges().map(j => j.slug));
  let candidate = base;
  let suffix = 2;
  while (used.has(candidate)) {
    candidate = `${base}-${suffix}`;
    suffix += 1;
  }
  return candidate;
}

/* ══════════════════════════════════════════════════════════════════════════
   Score math — pure functions over score records
   ══════════════════════════════════════════════════════════════════════════ */

const calcBase  = (s) => RUBRIC.reduce((a,r) => a + (Number(s?.[r.key]) || 0), 0);
const calcBonus = (b) => BONUSES.reduce((a,x) => a + (b?.[x.key] ? x.value : 0), 0);
const calcFinal = (s, b) => calcBase(s) + calcBonus(b);

function teamAggregates(team, scores) {
  const judges = getJudges();
  const teamScores = scores.filter(s => s.teamId === team.id);
  const submitted = teamScores.length;
  if (!submitted) {
    return { submitted, total: judges.length, missing: judges.map(j => j.name), avgBase: 0, avgBonus: 0, avgFinal: 0, perJudge: {}, perCriterion: {}, outlier: null };
  }
  const finals = teamScores.map(s => calcFinal(s.scores, s.bonuses));
  const avgFinal = finals.reduce((a,b)=>a+b,0) / finals.length;
  const avgBase  = teamScores.reduce((a,s) => a + calcBase(s.scores), 0) / submitted;
  const avgBonus = teamScores.reduce((a,s) => a + calcBonus(s.bonuses), 0) / submitted;
  const perJudge = {};
  for (const s of teamScores) perJudge[s.judgeSlug] = calcFinal(s.scores, s.bonuses);
  const perCriterion = {};
  for (const r of RUBRIC) perCriterion[r.key] = teamScores.reduce((a,s) => a + (Number(s.scores?.[r.key])||0), 0) / submitted;
  const submittedSlugs = new Set(teamScores.map(s => s.judgeSlug));
  const missing = judges.filter(j => !submittedSlugs.has(j.slug)).map(j => j.name);
  let outlier = null;
  for (const s of teamScores) {
    const f = calcFinal(s.scores, s.bonuses);
    if (Math.abs(f - avgFinal) > 20) { outlier = { judgeSlug: s.judgeSlug, judgeName: judgeBySlug(s.judgeSlug)?.name, delta: f - avgFinal }; break; }
  }
  return { submitted, total: judges.length, missing, avgBase, avgBonus, avgFinal, perJudge, perCriterion, outlier };
}

function rankedTeams(teams, scores) {
  const enriched = teams.map(t => ({ team: t, agg: teamAggregates(t, scores) }));
  enriched.sort((a, b) => {
    if (b.agg.avgFinal !== a.agg.avgFinal) return b.agg.avgFinal - a.agg.avgFinal;
    const af = a.agg.perCriterion?.functionality || 0, bf = b.agg.perCriterion?.functionality || 0;
    if (bf !== af) return bf - af;
    const ai = a.agg.perCriterion?.innovation || 0, bi = b.agg.perCriterion?.innovation || 0;
    if (bi !== ai) return bi - ai;
    const ab = a.agg.perCriterion?.business || 0, bb = b.agg.perCriterion?.business || 0;
    return bb - ab;
  });
  return enriched;
}

/* ══════════════════════════════════════════════════════════════════════════
   Utilities
   ══════════════════════════════════════════════════════════════════════════ */

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function navigate(hash) { window.location.hash = hash; }

function showToast(msg, kind = 'info') {
  const el = document.createElement('div');
  el.className = 'toast ' + kind;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.2s'; }, 2400);
  setTimeout(() => el.remove(), 2700);
}

function parseRoute() {
  const h = window.location.hash || '#/';
  if (h.startsWith('#/judge/')) return { name: 'judge', slug: h.slice(8) };
  if (h === '#/admin') return { name: 'admin' };
  if (h === '#/scoreboard') return { name: 'scoreboard' };
  return { name: 'home' };
}

function normalizeUsername(username) {
  return String(username || '').trim().toLowerCase();
}

function readStoredAuth() {
  try {
    const raw = localStorage.getItem(AUTH_STORAGE_KEY);
    if (!raw) return null;
    const auth = JSON.parse(raw);
    if (!auth || !auth.username || !auth.role) return null;
    if (auth.role === 'judge' && !auth.judgeSlug) return null;
    if (!['admin', 'judge'].includes(auth.role)) return null;
    return {
      username: normalizeUsername(auth.username),
      role: auth.role,
      judgeSlug: auth.judgeSlug || null,
      signedInAt: auth.signedInAt || null,
    };
  } catch (_) {
    localStorage.removeItem(AUTH_STORAGE_KEY);
    return null;
  }
}

function persistAuth(auth) {
  localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(auth));
}

function clearAuth() {
  localStorage.removeItem(AUTH_STORAGE_KEY);
  adminSessionPassword = '';
  state.auth = null;
  state.judgeForm = null;
}

function authDisplayName(auth = state.auth) {
  if (!auth) return '';
  if (auth.role === 'admin') return `Admin · ${auth.username}`;
  const judge = judgeBySlug(auth.judgeSlug);
  return judge ? `${judge.name} · ${judge.org}` : auth.username;
}

function routeRequiresAuth(route) {
  if (route.name === 'admin') return true;
  if (route.name === 'judge') return !!judgeBySlug(route.slug);
  return false;
}

function routeAccess(route, auth = state.auth) {
  if (!routeRequiresAuth(route)) return { allowed: true };
  if (!auth) return { allowed: false, reason: 'login' };
  if (route.name === 'admin') {
    return auth.role === 'admin'
      ? { allowed: true }
      : { allowed: false, reason: 'forbidden' };
  }
  if (route.name === 'judge') {
    return auth.role === 'judge' && auth.judgeSlug === route.slug
      ? { allowed: true }
      : { allowed: false, reason: 'forbidden' };
  }
  return { allowed: true };
}

function defaultRouteForAuth(auth = state.auth) {
  if (!auth) return '#/';
  if (auth.role === 'admin') return '#/admin';
  if (auth.role === 'judge' && auth.judgeSlug) return `#/judge/${auth.judgeSlug}`;
  return '#/';
}

function requireAdminAccess() {
  if (state.auth?.role === 'admin') return true;
  showToast('Admin credentials are required', 'error');
  navigate('#/admin');
  return false;
}

/* ══════════════════════════════════════════════════════════════════════════
   App state
   ══════════════════════════════════════════════════════════════════════════ */

const state = {
  ready: false,
  route: parseRoute(),
  auth: readStoredAuth(),
  data: { judges: [], teams: [], scores: [], settings: { locked: false, eventName: 'EDGE Hack 2026' } },
  judgeForm: null,
  connection: 'connecting', // 'connecting' | 'live' | 'error'
};

async function fetchData() {
  if (!sb) return;
  const [jRes, tRes, sRes, eRes] = await Promise.all([
    sb.from('judges').select('*').order('name', { ascending: true }),
    sb.from('teams').select('*').order('created_at', { ascending: true }),
    sb.from('scores').select('*'),
    sb.from('event_settings').select('*').eq('id', 1).maybeSingle(),
  ]);
  if (jRes.error) throw jRes.error;
  if (tRes.error) throw tRes.error;
  if (sRes.error) throw sRes.error;
  // event_settings might be missing if SQL didn't run — handle gracefully
  let settings = { locked: false, eventName: 'EDGE Hack 2026' };
  if (eRes.data) settings = { locked: !!eRes.data.locked, eventName: eRes.data.event_name || 'EDGE Hack 2026' };
  state.data = {
    judges: (jRes.data || []).map(judgeFromDB),
    teams: (tRes.data || []).map(teamFromDB),
    scores: (sRes.data || []).map(scoreFromDB),
    settings,
  };
}

async function refresh() {
  try { await fetchData(); render(); }
  catch (e) { console.error(e); showToast('Failed to fetch from Supabase', 'error'); }
}

/* ══════════════════════════════════════════════════════════════════════════
   Top-level render dispatcher
   ══════════════════════════════════════════════════════════════════════════ */

function render() {
  const root = document.getElementById('app');
  if (!state.ready) return;
  const access = routeAccess(state.route, state.auth);
  if (!access.allowed) {
    root.innerHTML = renderLoginPage(state.route, access.reason);
    bindLoginPage(state.route);
    return;
  }
  if (state.route.name === 'judge') {
    if (state.judgeForm && state.judgeForm.slug === state.route.slug) {
      root.innerHTML = renderJudgeScoringForm();
      bindJudgeScoringForm();
    } else {
      root.innerHTML = renderJudgePage(state.route.slug);
      bindJudgePage(state.route.slug);
    }
    return;
  }
  if (state.route.name === 'admin') { root.innerHTML = renderAdminPage(); bindAdminPage(); return; }
  if (state.route.name === 'scoreboard') { root.innerHTML = renderScoreboardPage(); bindScoreboardPage(); return; }
  root.innerHTML = renderHomePage();
}

function renderLoginPage(route, reason = 'login') {
  const judge = route.name === 'judge' ? judgeBySlug(route.slug) : null;
  const isJudgeRoute = !!judge;
  const title = route.name === 'admin' ? 'Admin Login' : `${judge?.name || 'Judge'} Login`;
  const routeLabel = route.name === 'admin' ? '#/admin' : `#/judge/${escapeHtml(route.slug || '')}`;
  const prefill = isJudgeRoute ? route.slug : '';
  const right = `
    <button class="btn" data-action="goto-scoreboard">${icon('trophy')}<span>Scoreboard</span></button>
    <button class="btn btn-ghost" data-action="goto-home">${icon('arrowLeft')}<span>Home</span></button>
  `;
  const currentNote = state.auth ? `
    <div class="auth-note warn mb-4">
      Signed in as ${escapeHtml(authDisplayName())}. This page requires ${route.name === 'admin' ? 'admin access' : `${escapeHtml(judge.name)} access`}.
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;">
        <button class="btn btn-ghost" data-action="goto-my-portal" type="button">${icon('external')}<span>My Page</span></button>
        <button class="btn btn-ghost" data-action="logout" type="button">${icon('logOut')}<span>Sign Out</span></button>
      </div>
    </div>
  ` : '';
  const message = reason === 'forbidden'
    ? 'Sign in with the account assigned to this page.'
    : 'Sign in to continue.';

  return `
    <div class="shell">
      ${topbarHTML(right)}
      <main class="auth-wrap eh-grid-bg">
        <div class="glow"></div>
        <section class="auth-card">
          <div class="auth-card-head">
            <div class="modal-eyebrow">// Sign in</div>
            <h1>${escapeHtml(title)}</h1>
            <div class="eh-mono" style="font-size:12px; color:var(--eh-text-dim);">
              Page <span class="auth-route">${routeLabel}</span>
            </div>
          </div>
          <div class="auth-card-body">
            ${currentNote}
            <div class="auth-note mb-4">${escapeHtml(message)}</div>
            <form class="auth-form" id="auth-login-form">
              <div class="field">
                <label class="field-label" for="auth-username">Login ID<span class="req">*</span></label>
                <input class="input" id="auth-username" name="username" autocomplete="username" autocapitalize="none" spellcheck="false" value="${escapeHtml(prefill)}" placeholder="${route.name === 'admin' ? 'admin login id' : 'judge login id'}" />
              </div>
              <div class="field">
                <label class="field-label" for="auth-password">Password<span class="req">*</span></label>
                <input class="input" id="auth-password" name="password" type="password" autocomplete="current-password" placeholder="password" />
              </div>
              <button class="btn btn-primary btn-lg btn-block" id="auth-submit" type="submit">${icon('lock')}<span>Sign In</span></button>
            </form>
          </div>
        </section>
      </main>
    </div>
  `;
}

function bindLoginPage(targetRoute) {
  const form = document.getElementById('auth-login-form');
  const usernameEl = document.getElementById('auth-username');
  const passwordEl = document.getElementById('auth-password');
  const submit = document.getElementById('auth-submit');
  if (!form || !usernameEl || !passwordEl || !submit) return;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = normalizeUsername(usernameEl.value);
    const password = passwordEl.value;
    if (!username || !password) {
      showToast('Login ID and password are required', 'error');
      return;
    }

    submit.disabled = true;
    submit.innerHTML = `${icon('lock')}<span>Checking...</span>`;
    try {
      const { data, error } = await sb.rpc('login', { p_username: username, p_password: password });
      if (error) throw error;
      const row = Array.isArray(data) ? data[0] : data;
      if (!row?.success) {
        showToast('Invalid login ID or password', 'error');
        return;
      }

      const auth = {
        username,
        role: row.role,
        judgeSlug: row.judge_slug || null,
        signedInAt: new Date().toISOString(),
      };
      state.auth = auth;
      state.judgeForm = null;
      adminSessionPassword = row.role === 'admin' ? password : '';
      persistAuth(auth);

      const access = routeAccess(targetRoute, auth);
      const destination = access.allowed ? window.location.hash : defaultRouteForAuth(auth);
      showToast(access.allowed ? 'Signed in' : 'Signed in · opening your page', 'success');
      if (window.location.hash !== destination) navigate(destination);
      else render();
    } catch (err) {
      console.error(err);
      showToast('Login failed: ' + (err.message || 'unknown error'), 'error');
    } finally {
      submit.disabled = false;
      submit.innerHTML = `${icon('lock')}<span>Sign In</span>`;
    }
  });

  (passwordEl.value ? passwordEl : usernameEl).focus();
}

  scores.filter(s => s.judgeSlug === slug).forEach(s => { myScores[s.teamId] = s; });
  const submittedCount = teams.filter(t => myScores[t.id]).length;
  const total = teams.length;
  const progressPct = total ? Math.round((submittedCount / total) * 100) : 0;

  const right = `<button class="btn" data-action="goto-scoreboard">${icon('trophy')}<span>Scoreboard</span></button>`;

    ? emptyHTML('No teams yet', 'Teams added by an admin will appear here.', 'users')

   Judge scoring form
   ══════════════════════════════════════════════════════════════════════════ */

function openScoringForm(slug, teamId) {
  const existing = state.data.scores.find(s => s.teamId === teamId && s.judgeSlug === slug);
  state.judgeForm = {
    slug, teamId,
    scores:  existing ? { ...existing.scores }  : Object.fromEntries(RUBRIC.map(r => [r.key, 0])),
    bonuses: existing ? { ...existing.bonuses } : Object.fromEntries(BONUSES.map(b => [b.key, false])),
    feedback: existing ? (existing.feedback || '') : '',
    existingId: existing ? existing.id : null,

function bindJudgeScoringForm() {
  const f = state.judgeForm;
  if (!f) return;
  document.querySelectorAll('input[data-criterion]').forEach(input => {
    input.addEventListener('input', e => {
      const key = e.target.getAttribute('data-criterion');
      const v = Number(e.target.value);
      f.scores[key] = v;
      const max = RUBRIC.find(r => r.key === key).max;
      e.target.style.setProperty('--pct', `${(v/max)*100}%`);
      const numEl = document.querySelector(`[data-num="${key}"]`);
      if (numEl) numEl.textContent = v;
      updateLiveCalc();
    });
  });
  document.querySelectorAll('input[data-bonus]').forEach(input => {
    input.addEventListener('change', e => {
      const key = e.target.getAttribute('data-bonus');
      f.bonuses[key] = e.target.checked;
      e.target.closest('.bonus-tile').classList.toggle('is-checked', e.target.checked);
      updateLiveCalc();
    });
  });
  const fbEl = document.querySelector('[data-feedback]');
  if (fbEl) fbEl.addEventListener('input', e => { f.feedback = e.target.value; });
  document.querySelectorAll('[data-action="save-score"]').forEach(b => b.addEventListener('click', saveScore));
  document.querySelectorAll('[data-action="close-scoring"]').forEach(b => b.addEventListener('click', closeScoringForm));
}

function updateLiveCalc() {
  const f = state.judgeForm; if (!f) return;
  const base = calcBase(f.scores), bonus = calcBonus(f.bonuses), final = base + bonus;
  const set = (sel, val) => { const el = document.querySelector(sel); if (el) el.textContent = val; };
  const baseTag = document.querySelector('[data-calc="base-tag"]'); if (baseTag) baseTag.textContent = `${base} / ${BASE_MAX}`;
  const bonusTag = document.querySelector('[data-calc="bonus-tag"]'); if (bonusTag) bonusTag.textContent = `+${bonus}`;
  const baseRow = document.querySelector('[data-calc="base"]'); if (baseRow) baseRow.innerHTML = `${base}<span class="max"> / 100</span>`;
  set('[data-calc="bonus"]', bonus);
  const finalEl = document.querySelector('[data-calc="final"]'); if (finalEl) finalEl.innerHTML = `${final}<span class="max"> / 115</span>`;
  set('[data-calc="base-mobile"]', base);
  set('[data-calc="bonus-mobile"]', `+${bonus}`);
  set('[data-calc="final-mobile"]', final);
}

async function saveScore() {
  const f = state.judgeForm;
  if (!f) return;
  if (!state.auth || state.auth.role !== 'judge' || state.auth.judgeSlug !== f.slug) {
    showToast('You must sign in as this judge before saving', 'error');
    render();
    return;
  }
  if (state.data.settings.locked) { showToast('Scoring is locked', 'error'); return; }

  const payload = {
    team_id: f.teamId,
    judge_slug: f.slug,
    scores: f.scores,
    bonuses: f.bonuses,
    feedback: f.feedback || null,
  };

  try {
    const { error } = await sb
      .from('scores')
      .upsert(payload, { onConflict: 'team_id,judge_slug' });
    if (error) throw error;
    showToast('Score saved · syncing to scoreboard', 'success');
    await fetchData();
    closeScoringForm();
  } catch (e) {
    console.error(e);
    showToast('Save failed: ' + (e.message || 'unknown error'), 'error');
  }
}

async function toggleLock() {
  if (!requireAdminAccess()) return;
  const next = !state.data.settings.locked;
  try {
    const { error } = await sb.from('event_settings').update({ locked: next }).eq('id', 1);
    if (error) throw error;
    showToast(next ? 'Scoring locked' : 'Scoring unlocked', 'success');
    refresh();
  } catch (e) { showToast('Lock toggle failed: ' + e.message, 'error'); }
}

async function deleteTeam(team) {
  if (!requireAdminAccess()) return;
  try {
    // ON DELETE CASCADE on team_id will remove related scores too
    const { error } = await sb.from('teams').delete().eq('id', team.id);
    if (error) throw error;
    showToast(`Deleted ${team.name}`, 'success');
    refresh();
  } catch (e) { showToast('Delete failed: ' + e.message, 'error'); }
}

async function doClearData() {
  if (!requireAdminAccess()) return;
  try {
    // Delete all scores then all teams (cascade also handles, but explicit is clearer)
    const scoreRes = await sb.from('scores').delete().not('id', 'is', null);
    if (scoreRes.error) throw scoreRes.error;
    const teamRes = await sb.from('teams').delete().not('id', 'is', null);
    if (teamRes.error) throw teamRes.error;
    showToast('Teams and scores cleared', 'success');
    refresh();
  } catch (e) { showToast('Clear failed: ' + e.message, 'error'); }
}

function exportCSV() {
  if (!requireAdminAccess()) return;
  const { judges, teams, scores } = state.data;
  const ranked = rankedTeams(teams, scores);
  const header = [
    'rank','team_id','team_name','project_title','track','table',
    'submitted_judges','missing_judges',
    ...judges.map(j => `${j.slug}_final`),
    'avg_base','avg_bonus','avg_final',
    ...RUBRIC.map(r => `avg_${r.key}`),
    'outlier_warning'
  ];
  const rows = [header];
  ranked.forEach((entry, idx) => {
    const { team, agg } = entry;
    rows.push([
      idx + 1, team.id, team.name, team.projectTitle, team.track || '', team.tableNumber || '',
      `${agg.submitted}/${agg.total}`, agg.missing.join('; '),
      ...judges.map(j => agg.perJudge[j.slug] != null ? agg.perJudge[j.slug] : ''),
      agg.avgBase.toFixed(2), agg.avgBonus.toFixed(2), agg.avgFinal.toFixed(2),
      ...RUBRIC.map(r => (agg.perCriterion[r.key] || 0).toFixed(2)),
      agg.outlier ? `${agg.outlier.judgeName} ${agg.outlier.delta>0?'+':''}${agg.outlier.delta.toFixed(1)}` : ''
    ]);
  });
  const csv = rows.map(r => r.map(cell => {
    const s = String(cell ?? '');
    return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `edgehack2026_scoreboard_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported', 'success');
}

        </div>
      </div>
    </div>
  `;
  root.querySelector('.modal-backdrop').addEventListener('click', backdropClick);
  root.querySelectorAll('[data-action="close-modal"]').forEach(b => b.addEventListener('click', clearModal));
  document.getElementById('team-save-btn').addEventListener('click', async () => {
    if (!requireAdminAccess()) { clearModal(); return; }
    const out = { ...form };
    document.querySelectorAll('[data-field]').forEach(el => { out[el.getAttribute('data-field')] = el.value.trim(); });
    if (!out.name || !out.projectTitle) { showToast('Team name and project title are required', 'error'); return; }
    try {
      if (out.id) {
        const { error } = await sb.from('teams').update(teamToDB(out)).eq('id', out.id);
        if (error) throw error;
      } else {
        const { error } = await sb.from('teams').insert(teamToDB(out));
        if (error) throw error;
      }
      showToast(out.id ? 'Team updated' : 'Team added', 'success');
      clearModal();
      refresh();
    } catch (e) { showToast('Save failed: ' + e.message, 'error'); }
  });
  document.querySelector('[data-field="name"]')?.addEventListener('input', e => {
    const t = document.getElementById('team-modal-title');
    if (t && editing) t.textContent = e.target.value || 'Untitled';
  });
  document.querySelector('[data-field="name"]')?.focus();
}

  const nameEl = root.querySelector('[data-judge-field="name"]');
  const slugEl = root.querySelector('[data-judge-field="slug"]');
  const titleEl = root.querySelector('#judge-modal-title');
  const previewEl = root.querySelector('#judge-url-preview');
  const saveBtn = root.querySelector('#judge-save-btn');
  let slugTouched = false;

  function currentPreviewSlug() {
    return slugify(slugEl.value) || nextJudgeSlug(nameEl.value) || 'new-judge';
  }

  function updatePreview() {
    const slug = currentPreviewSlug();
    if (previewEl) previewEl.textContent = judgePortalUrl(slug);
    if (titleEl) titleEl.textContent = nameEl.value.trim() || 'Add Judge';
  }

  root.querySelector('.modal-backdrop').addEventListener('click', backdropClick);
  root.querySelectorAll('[data-action="close-modal"]').forEach(b => b.addEventListener('click', clearModal));
  nameEl.addEventListener('input', () => {
    if (!slugTouched) slugEl.value = nextJudgeSlug(nameEl.value);
    updatePreview();
  });
  slugEl.addEventListener('input', () => {
    slugTouched = true;
    const clean = slugify(slugEl.value);
    if (slugEl.value !== clean) slugEl.value = clean;
    updatePreview();
  });

  saveBtn.addEventListener('click', async () => {
    if (!requireAdminAccess()) { clearModal(); return; }
    const fields = {};
    root.querySelectorAll('[data-judge-field]').forEach(el => { fields[el.getAttribute('data-judge-field')] = el.value.trim(); });
    const adminPassword = adminSessionPassword || fields.adminPassword || '';
    const requestedSlug = slugify(fields.slug || fields.name);
    if (!fields.name || !fields.org) { showToast('Judge name and organization are required', 'error'); return; }
    if (!requestedSlug) { showToast('Judge slug needs at least one letter or number', 'error'); return; }
    if (!adminPassword) { showToast('Admin password is required to create credentials', 'error'); return; }

    saveBtn.disabled = true;
      saveBtn.innerHTML = `${icon('save')}<span>Adding...</span>`;
    try {
      const { data, error } = await sb.rpc('create_judge_with_credentials', {
        p_admin_username: state.auth.username,
        p_admin_password: adminPassword,
        p_name: fields.name,
        p_org: fields.org,
        p_expertise: fields.expertise || null,
        p_slug: requestedSlug,
      });
      if (error) throw error;
      const row = Array.isArray(data) ? data[0] : data;
      if (!row?.slug || !row?.username || !row?.password) {
        throw new Error('Supabase did not return judge credentials');
      }

      adminSessionPassword = adminPassword;
      await fetchData();
      render();
      openJudgeCredentialsModal({
        name: fields.name,
        org: fields.org,
        expertise: fields.expertise || '',
        slug: row.slug,
        username: row.username,
        password: row.password,
        url: judgePortalUrl(row.slug),
      });
      showToast('Judge added', 'success');
    } catch (e) {
      console.error(e);
      saveBtn.disabled = false;
      saveBtn.innerHTML = `${icon('save')}<span>Add Judge</span>`;
      showToast('Judge create failed: ' + (e.message || 'unknown error'), 'error');
    }
  });

  updatePreview();
  nameEl.focus();
}

async function deleteJudge(judge, passwordOverride = '', button = null) {
  if (!requireAdminAccess()) { clearModal(); return; }
  const adminPassword = adminSessionPassword || passwordOverride;
  if (!adminPassword) {
    showToast('Admin password is required to delete a judge', 'error');
    return;
  }

  if (button) {
    button.disabled = true;
    button.innerHTML = `${icon('trash')}<span>Deleting...</span>`;
  }

  try {
    const { error } = await sb.rpc('delete_judge_with_credentials', {
      p_admin_username: state.auth.username,
      p_admin_password: adminPassword,
      p_judge_slug: judge.slug,
    });
    if (error) throw error;

    adminSessionPassword = adminPassword;
    showToast(`Deleted ${judge.name}`, 'success');
    clearModal();
    await refresh();
  } catch (e) {
    console.error(e);
    if (button) {
      button.disabled = false;
      button.innerHTML = `${icon('trash')}<span>Delete judge</span>`;
    }
    showToast('Judge delete failed: ' + (e.message || 'unknown error'), 'error');
  }
}

let scoreboardPulse = 0;
let lastScoreCount = 0;

function renderScoreboardPage() {
  const { judges, teams, scores, settings } = state.data;
  if (scores.length !== lastScoreCount) { scoreboardPulse++; lastScoreCount = scores.length; }
  const ranked = rankedTeams(teams, scores);
  const totalSubmitted = scores.length;
  const expectedTotal = teams.length * judges.length;
  const progress = expectedTotal ? (totalSubmitted / expectedTotal) * 100 : 0;
  const podium = ranked.slice(0, 3).filter(r => r.agg.submitted > 0);

  const right = `
    <button class="btn" data-action="manual-refresh">${icon('refresh')}<span>Refresh</span></button>
    <button class="btn" data-action="goto-admin">${icon('clipboard')}<span>Admin</span></button>
  `;

  const podiumHTML = podium.length === 0 ? '' : `
    <div class="podium-grid">
      ${podium.map((entry, idx) => {
        const cls = idx === 0 ? 'gold' : idx === 1 ? 'silver' : 'bronze';
        return `
          <div class="podium-card ${cls}">
            <div class="trophy">${icon('trophy', 'width="14" height="14"')}</div>
            <div class="rank">0${idx + 1}</div>
            <div class="team-name">${escapeHtml(entry.team.name)}</div>
            <div class="project">${escapeHtml(entry.team.projectTitle)}</div>
            <div class="final"><span class="num">${entry.agg.avgFinal.toFixed(1)}</span><span class="max">/ 115</span></div>
            <div class="breakdown">${entry.agg.submitted}/${entry.agg.total} judges · base ${entry.agg.avgBase.toFixed(1)} · bonus +${entry.agg.avgBonus.toFixed(1)}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  const tableHTML = ranked.length === 0
    ? emptyHTML('No teams yet', 'Add teams from Admin to populate the scoreboard.', 'trophy')
    : `<div class="panel">
      <div class="table-wrap">
        <table class="eh-table">
          <thead><tr>
            <th class="sticky-col">Rank</th>
            <th>Team / Project</th>
            ${judges.map(j => `<th class="text-center" title="${escapeHtml(j.name)} (${escapeHtml(j.org)})">${escapeHtml(j.name.split(' ')[0])}</th>`).join('')}
            <th class="text-center">Submitted</th>
            <th class="text-right">Avg Base</th>
            <th class="text-right">Avg Bonus</th>
            <th class="text-right border-l">Final Avg</th>
            <th>Flags</th>
          </tr></thead>
          <tbody>
            ${ranked.map((entry, idx) => {
              const { team, agg } = entry;
              const rankColor = idx === 0 ? 'text-lime' : idx === 1 ? 'text-cyan' : idx === 2 ? 'text-amber' : 'text-dim';
              const judgeCells = judges.map(j => {
                const v = agg.perJudge[j.slug];
                const isOutlier = agg.outlier?.judgeSlug === j.slug;
                if (v == null) return `<td class="text-center text-mute">—</td>`;
                if (isOutlier) return `<td class="text-center text-rose"><span class="outlier-cell">${v}</span></td>`;
                return `<td class="text-center">${v}</td>`;
              }).join('');
              const flagsHTML = `
                ${agg.missing.length ? `<div class="text-mute" style="font-size:10px;">missing: ${escapeHtml(agg.missing.join(', '))}</div>` : ''}
                ${agg.outlier ? `<div class="text-rose" style="font-size:10px; display:inline-flex; align-items:center; gap:4px;">${icon('alert', 'width="11" height="11"')}${escapeHtml(agg.outlier.judgeName)} ${agg.outlier.delta > 0 ? '+' : ''}${agg.outlier.delta.toFixed(1)} from avg</div>` : ''}
              `;
              return `<tr>
                <td class="sticky-col"><span class="eh-display ${rankColor}" style="font-size:24px;">#${idx + 1}</span></td>
                <td style="min-width:220px;">
                  <div class="eh-display" style="font-size:16px; color:var(--eh-text);">${escapeHtml(team.name)}</div>
                  <div class="line-clamp-1 text-mute" style="font-size:10px; max-width:260px;">${escapeHtml(team.projectTitle)}</div>
                </td>
                ${judgeCells}
                <td class="text-center"><span class="${agg.submitted === agg.total ? 'text-lime' : 'text-dim'}">${agg.submitted}/${agg.total}</span></td>
                <td class="text-right text-dim">${agg.submitted ? agg.avgBase.toFixed(1) : '—'}</td>
                <td class="text-right text-cyan">${agg.submitted ? `+${agg.avgBonus.toFixed(1)}` : '—'}</td>
                <td class="text-right border-l"><span class="eh-display text-lime" style="font-size:20px;">${agg.submitted ? agg.avgFinal.toFixed(1) : '—'}</span></td>
                <td>${flagsHTML}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  return `
    <div class="shell">
      ${topbarHTML(right)}
      <main class="container" style="padding:24px 20px;">
        <div class="admin-header">
          <div>
            <div class="hero-eyebrow">
              <span class="dot eh-pulse-dot"></span>
              <span class="text">// Scoreboard</span>
            </div>
            <h1 class="eh-display" style="font-size:48px; margin:0;">Scoreboard</h1>
            <div class="eh-mono" style="font-size:12px; color:var(--eh-text-dim); margin-top:4px;">
              ${totalSubmitted} of ${expectedTotal} scores submitted (${progress.toFixed(0)}%)
              ${settings.locked ? '<span class="text-amber" style="margin-left:8px;">· LOCKED</span>' : ''}
            </div>
          </div>
          <div class="admin-actions">
            <span class="tag tag-lime">Update #${scoreboardPulse}</span>
            <span class="tag tag-mute">${teams.length} teams</span>
          </div>
        </div>
        ${podiumHTML}
        ${tableHTML}
        <div class="legend">
          ${icon('activity', 'width="11" height="11"')}
          Ranking uses final average. Ties use Functionality, then Innovation, then Business Impact.
          ${icon('alert', 'width="11" height="11" style="color:#f87171"')}
          <span class="outlier-mark">outlier</span> = judge score 20+ points from team average.
        </div>
      </main>
    </div>
  `;
}

  document.querySelectorAll('[data-action="manual-refresh"]').forEach(b => b.addEventListener('click', refresh));
}

  if (!t) return;
  const action = t.getAttribute('data-action');
  if (action === 'goto-home') navigate('#/');
  else if (action === 'goto-admin') navigate('#/admin');
  else if (action === 'goto-scoreboard') navigate('#/scoreboard');
  else if (action === 'goto-judge') navigate('#/judge/' + t.getAttribute('data-slug'));
  else if (action === 'goto-my-portal') navigate(defaultRouteForAuth());
  else if (action === 'logout') {
    clearAuth();
    showToast('Signed out', 'info');
    render();
  }
});

window.addEventListener('hashchange', () => {
  state.route = parseRoute();
  if (state.judgeForm && (state.route.name !== 'judge' || state.route.slug !== state.judgeForm.slug)) {
    state.judgeForm = null;
  }
  render();
});

/* ══════════════════════════════════════════════════════════════════════════
   Boot — init Supabase, fetch initial data, subscribe to realtime
   ══════════════════════════════════════════════════════════════════════════ */

(async function boot() {
  if (!isConfigured()) { renderSetupScreen(); return; }
  if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
    renderErrorScreen('Supabase JS SDK failed to load. Check your internet connection — the SDK is loaded from a CDN. For offline use, download supabase-js and reference it locally.');
    return;
  }

  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      realtime: { params: { eventsPerSecond: 10 } },
    });
  } catch (e) {
    renderErrorScreen('Failed to initialise Supabase client: ' + e.message);
    return;
  }

  try {
    await fetchData();
  } catch (e) {
    renderErrorScreen(e.message || String(e));
    return;
  }

  // Subscribe to realtime updates on the three mutable tables
  sb.channel('edgehack-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'judges' },         () => onRealtime())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'teams' },          () => onRealtime())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'scores' },         () => onRealtime())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'event_settings' }, () => onRealtime())
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') { state.connection = 'live'; render(); }
      else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') { state.connection = 'error'; render(); }
    });

  state.ready = true;
  state.connection = 'live';
  render();

  // Light safety-net: every 30s also fetch fresh in case a realtime event was missed
  setInterval(() => { if (!state.judgeForm) refresh().catch(() => {}); }, 30000);
})();

async function onRealtime() {
  // While a judge is in the middle of scoring, we hold off on overwriting their UI.
  // The data will be re-fetched when they save or close the form.
  if (state.judgeForm) return;
  try { await fetchData(); render(); }
  catch (e) { console.error('Realtime fetch failed', e); }
}
</script>
